name: Build ONNX Runtime (macOS x86_64) and upload release asset

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (unused, kept for parity)'
        required: false
        default: ''
      ort_version:
        description: 'ONNX Runtime version to checkout (e.g. v1.24.2)'
        required: true
        default: 'v1.24.2'
      release_tag:
        description: 'Release tag/name to upload asset to (will be created if missing)'
        required: true
        default: 'deps-onnxruntime'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-15-intel
    env:
      BUILD_DIR: onnxruntime/build/macOS_x86_64/Release
      ARCHIVE_NAME: onnxruntime-macos-x86_64-${{ github.event.inputs.ort_version }}-shared.zip

    steps:
      - name: Checkout repository (for context)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Restore ONNX Runtime cache (Intel)
        id: ort-cache
        uses: actions/cache@v4
        with:
          path: onnxruntime/build/macOS_x86_64/Release
          key: onnxruntime-macos-x86_64-v1.24.2-shared

      - name: Checkout ONNX Runtime sources (cache miss)
        if: steps.ort-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          ref: ${{ github.event.inputs.ort_version }}
          path: onnxruntime
          submodules: recursive

      - name: Install Homebrew deps (cache miss)
        if: steps.ort-cache.outputs.cache-hit != 'true'
        run: |
          brew update
          brew install cmake ninja python@3.11 pkg-config openssl zstd

      - name: Build ONNX Runtime (Intel macOS) (cache miss)
        if: steps.ort-cache.outputs.cache-hit != 'true'
        working-directory: onnxruntime
        run: |
          python3 tools/ci_build/build.py \
            --build_dir build/macOS_x86_64 \
            --config Release \
            --parallel \
            --skip_tests \
            --compile_no_warning_as_error \
            --build_shared_lib \
            --cmake_extra_defines CMAKE_OSX_ARCHITECTURES=x86_64 onnxruntime_BUILD_UNIT_TESTS=OFF

      - name: Fix ONNX Runtime dylib install name (only when built now)
        if: steps.ort-cache.outputs.cache-hit != 'true'
        run: |
          DYLIB="${{ github.workspace }}/onnxruntime/build/macOS_x86_64/Release/libonnxruntime.dylib"
          if [ -f "$DYLIB" ]; then
            install_name_tool -id @rpath/libonnxruntime.dylib "$DYLIB"
          fi

      - name: Ensure build dir exists (debug)
        run: |
          echo "cache-hit=${{ steps.ort-cache.outputs.cache-hit }}"
          ls -la ${BUILD_DIR} || true

      - name: Archive build output
        run: |
          mkdir -p artifacts
          zip -r artifacts/${ARCHIVE_NAME} ${BUILD_DIR} || true

      - name: Upload artifact for run
        uses: actions/upload-artifact@v4
        with:
          name: ${ARCHIVE_NAME}
          path: artifacts/${ARCHIVE_NAME}

      - name: Create/find release and upload asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          ASSET="artifacts/${ARCHIVE_NAME}"
          if [ ! -f "$ASSET" ]; then
            echo "No asset found at $ASSET; aborting release upload."
            exit 0
          fi
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" -t "$RELEASE_TAG" -n "ONNX Runtime macOS builds" --repo "$GITHUB_REPOSITORY"
          fi
          gh release upload "$RELEASE_TAG" "$ASSET" --repo "$GITHUB_REPOSITORY" --clobber
