# Build Rhema (Tauri) for macOS arm64 + x86_64 and publish assets to the GitHub Release
# for the pushed tag (e.g. v0.2.0). Tag is the source of truth; versions are synced in CI.

name: Release (macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --features onnx"
            # Apple Silicon requires macOS 11.0+; std::filesystem (used by
            # whisper.cpp) is unavailable below 10.15, so 11.0 is the right floor.
            macos_deployment_target: "11.0"
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin --features onnx"
            macos_deployment_target: "10.15"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python for Intel ONNX Runtime build
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download prebuilt ONNX Runtime (Intel) from release asset
        if: matrix.target == 'x86_64-apple-darwin'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # This asset is produced by .github/workflows/restore-cache-and-upload.yml
          # and contains onnxruntime/build/macOS_x86_64/Release/...
          gh release download deps-onnxruntime \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "onnxruntime-macos-x86_64-v1.24.2-shared.zip" \
            --output /tmp/onnxruntime-macos-x86_64-v1.24.2-shared.zip
          unzip -o /tmp/onnxruntime-macos-x86_64-v1.24.2-shared.zip -d "${GITHUB_WORKSPACE}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure matrix Rust target is installed
        run: rustup target add "${{ matrix.target }}"

      - name: Show installed Rust targets
        run: rustup target list --installed

      - name: Set macOS deployment target
        run: echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}" >> $GITHUB_ENV

      - name: Force deployment target in Cargo config (overrides Cargo's automatic value)
        # Cargo overrides MACOSX_DEPLOYMENT_TARGET for build scripts from the Rust target
        # spec, so $GITHUB_ENV alone is insufficient. The [env] table with force=true in
        # .cargo/config.toml takes precedence and is seen by all build scripts (e.g.
        # whisper-rs-sys's cmake invocation), ensuring std::filesystem is available.
        # Patch the committed src-tauri/.cargo/config.toml in place — do not append a second
        # [env] table (invalid TOML: duplicate key).
        run: |
          mkdir -p src-tauri/.cargo
          CFG="src-tauri/.cargo/config.toml"
          TARGET="${{ matrix.macos_deployment_target }}"
          if [ -f "$CFG" ] && grep -q '^MACOSX_DEPLOYMENT_TARGET' "$CFG"; then
            sed -i '' "s/^MACOSX_DEPLOYMENT_TARGET = .*/MACOSX_DEPLOYMENT_TARGET = { value = \"${TARGET}\", force = true }/" "$CFG"
          else
            printf '[env]\nMACOSX_DEPLOYMENT_TARGET = { value = "%s", force = true }\n' "$TARGET" > "$CFG"
          fi

      - name: Fix ONNX Runtime dylib install name for bundling
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          DYLIB="${{ github.workspace }}/onnxruntime/build/macOS_x86_64/Release/libonnxruntime.dylib"
          if [ -f "$DYLIB" ]; then
            install_name_tool -id @rpath/libonnxruntime.dylib "$DYLIB"
          fi

      - name: Export ORT_LIB_PATH for Intel build
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          echo "ORT_LIB_PATH=${{ github.workspace }}/onnxruntime/build/macOS_x86_64/Release" >> $GITHUB_ENV
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> $GITHUB_ENV

      - name: Patch tauri.conf.json to bundle libonnxruntime.dylib (Intel only)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          DYLIB="${{ github.workspace }}/onnxruntime/build/macOS_x86_64/Release/libonnxruntime.dylib"
          jq --arg dylib "$DYLIB" \
            '.bundle.macOS.frameworks = (.bundle.macOS.frameworks // []) + [$dylib]' \
            src-tauri/tauri.conf.json > /tmp/tauri.conf.json.tmp
          mv /tmp/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Download rhema.db data release
        run: |
          gh release download data-v1 \
            --repo ojutalayomi/rhema \
            --pattern "rhema.db" \
            --output data/rhema.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Cache Whisper GGML model
        uses: actions/cache@v4
        id: whisper-model
        with:
          path: models/whisper/ggml-large-v3-turbo-q8_0.bin
          key: whisper-ggml-large-v3-turbo-q8_0-bin

      - name: Download Whisper model (bundled for local STT)
        if: steps.whisper-model.outputs.cache-hit != 'true'
        run: bun run download:whisper

      - name: Sync version from tag
        run: bun run scripts/set-version-from-tag.ts --tag "${{ github.ref_name }}"

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Rhema ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download this version.

            **Note:** macOS builds are currently **unsigned**. Gatekeeper may show a warning on first open.
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
