# Build Rhema (Tauri) for macOS arm64 + x86_64 and publish assets to the GitHub Release
# for the pushed tag (e.g. v0.2.0). Tag is the source of truth; versions are synced in CI.

name: Release (macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            # Apple Silicon requires macOS 11.0+; std::filesystem (used by
            # whisper.cpp) is unavailable below 10.15, so 11.0 is the right floor.
            macos_deployment_target: "11.0"
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            macos_deployment_target: "10.15"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python for Intel ONNX Runtime build
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Restore ONNX Runtime cache (Intel)
        if: matrix.target == 'x86_64-apple-darwin'
        id: ort-cache
        uses: actions/cache@v4
        with:
          path: onnxruntime/build/macOS_x86_64/Release
          key: onnxruntime-macos-x86_64-v1.24.2

      - name: Checkout ONNX Runtime sources
        if: matrix.target == 'x86_64-apple-darwin' && steps.ort-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          ref: v1.24.2
          path: onnxruntime
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure matrix Rust target is installed
        run: rustup target add "${{ matrix.target }}"

      - name: Show installed Rust targets
        run: rustup target list --installed

      - name: Set macOS deployment target
        run: echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}" >> $GITHUB_ENV

      - name: Force deployment target in Cargo config (overrides Cargo's automatic value)
        # Cargo overrides MACOSX_DEPLOYMENT_TARGET for build scripts from the Rust target
        # spec, so $GITHUB_ENV alone is insufficient. The [env] table with force=true in
        # .cargo/config.toml takes precedence and is seen by all build scripts (e.g.
        # whisper-rs-sys's cmake invocation), ensuring std::filesystem is available.
        run: |
          mkdir -p src-tauri/.cargo
          printf '[env]\nMACOSX_DEPLOYMENT_TARGET = { value = "%s", force = true }\n' \
            "${{ matrix.macos_deployment_target }}" >> src-tauri/.cargo/config.toml

      - name: Build ONNX Runtime for Intel macOS
        if: matrix.target == 'x86_64-apple-darwin' && steps.ort-cache.outputs.cache-hit != 'true'
        working-directory: onnxruntime
        run: |
          python3 tools/ci_build/build.py \
            --build_dir build/macOS_x86_64 \
            --config Release \
            --parallel \
            --skip_tests \
            --compile_no_warning_as_error \
            --cmake_extra_defines CMAKE_OSX_ARCHITECTURES=x86_64 onnxruntime_BUILD_UNIT_TESTS=OFF

      - name: Export ORT_LIB_PATH for Intel build
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          echo "ORT_LIB_PATH=${{ github.workspace }}/onnxruntime/build/macOS_x86_64/Release" >> $GITHUB_ENV
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Download rhema.db data release
        run: |
          gh release download data-v1 \
            --repo ojutalayomi/rhema \
            --pattern "rhema.db" \
            --output data/rhema.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Sync version from tag
        run: bun run scripts/set-version-from-tag.ts --tag "${{ github.ref_name }}"

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Rhema ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download this version.

            **Note:** macOS builds are currently **unsigned**. Gatekeeper may show a warning on first open.
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
