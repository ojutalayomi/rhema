# Build Rhema (Tauri) for macOS arm64 + x86_64 and publish assets to the GitHub Release
# for the pushed tag (e.g. v0.2.0). Tag is the source of truth; versions are synced in CI.

name: Release (macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python for Intel ONNX Runtime build
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Checkout ONNX Runtime sources
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          ref: v1.24.2
          path: onnxruntime
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure matrix Rust target is installed
        run: rustup target add "${{ matrix.target }}"

      - name: Show installed Rust targets
        run: rustup target list --installed

      - name: Build ONNX Runtime for Intel macOS
        if: matrix.target == 'x86_64-apple-darwin'
        working-directory: onnxruntime
        run: |
          python3 tools/ci_build/build.py \
            --build_dir build/macOS_x86_64 \
            --config Release \
            --parallel \
            --cmake_extra_defines CMAKE_OSX_ARCHITECTURES=x86_64

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: bun install

      - name: Sync version from tag
        run: bun run scripts/set-version-from-tag.ts --tag "${{ github.ref_name }}"

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORT_LIB_PATH: ${{ matrix.target == 'x86_64-apple-darwin' && format('{0}/onnxruntime/build/macOS_x86_64/Release', github.workspace) || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Rhema ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download this version.

            **Note:** macOS builds are currently **unsigned**. Gatekeeper may show a warning on first open.
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
